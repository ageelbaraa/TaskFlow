worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Needed for SignalR long-polling fallback (not used in prod but safe to include).
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream api_upstream {
        server api:8080;
        keepalive 32;
    }

    # ── HTTP server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Health / readiness probe passthrough ──────────────────────────────
        location = /health {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── SignalR WebSocket hub ─────────────────────────────────────────────
        # The Upgrade + Connection headers must be forwarded; without them the
        # broker would downgrade to long-polling and presence would be unreliable.
        location /hubs/ {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 3600s;
        }

        # ── REST API ──────────────────────────────────────────────────────────
        location / {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }
    }
}
